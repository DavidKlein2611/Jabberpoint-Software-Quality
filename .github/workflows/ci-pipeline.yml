name: CI - Ontwikkeling (O) & Test (T)

on:
  push:
    branches: [ "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ==========================================
  # === 1. ONTWIKKELING (O)                ===
  # ==========================================
  # Doel: Snelle feedback op de code. Controleren
  # of het project succesvol bouwt en of alle
  # unit tests slagen op de feature/develop branches.
  ontwikkeling:
    name: Ontwikkeling (O)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Compile and Test
        run: xvfb-run mvn clean test

  # ==========================================
  # === 2. TEST (T)                        ===
  # ==========================================
  # Doel: Kwaliteit en veiligheid waarborgen.
  # Deze stap draait pas nadat de Ontwikkeling (O)
  # stap succesvol is afgerond. Hier draaien de
  # langzamere en grondigere analyses (Checkstyle, OWASP).
  test:
    name: Test (T)
    needs: ontwikkeling # T wacht tot O succesvol is
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Code Quality & Dependency Checks
        run: mvn checkstyle:check org.owasp:dependency-check-maven:check
