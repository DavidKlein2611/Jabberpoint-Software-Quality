name: 1. Ontwikkeling (O)

on:
  push:
    branches: [develop, "feature/*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Compile and Test
        run: xvfb-run mvn clean test
